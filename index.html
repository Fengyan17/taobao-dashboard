<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>淘宝畜牧宠物品类数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0f1a;color:#e2e8f0;min-height:100vh}
.top-bar{display:flex;align-items:center;padding:16px 32px;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.06);gap:16px;flex-wrap:wrap}
.title{font-size:16px;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:12px;color:#475569;margin-top:2px}
.right{margin-left:auto;display:flex;align-items:center;gap:12px}
.sync-info{font-size:12px;color:#64748b}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:20px 32px}
.kpi-card{background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px 24px;position:relative;overflow:hidden;transition:transform .2s}
.kpi-card:hover{transform:translateY(-2px)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
.kpi-card:nth-child(1)::before{background:linear-gradient(90deg,#3b82f6,#6366f1)}
.kpi-card:nth-child(2)::before{background:linear-gradient(90deg,#10b981,#06b6d4)}
.kpi-card:nth-child(3)::before{background:linear-gradient(90deg,#f59e0b,#ef4444)}
.kpi-card:nth-child(4)::before{background:linear-gradient(90deg,#8b5cf6,#ec4899)}
.kpi-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.kpi-value{font-size:30px;font-weight:800;color:#f1f5f9;line-height:1}
.kpi-sub{font-size:12px;color:#475569;margin-top:6px}
.filter-bar{display:flex;gap:10px;padding:0 32px 16px;align-items:center;flex-wrap:wrap}
.filter-bar span{font-size:13px;color:#64748b}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#94a3b8;font-size:12px;cursor:pointer;transition:all .2s}
.filter-btn.active,.filter-btn:hover{background:rgba(59,130,246,0.2);border-color:#3b82f6;color:#60a5fa}
select{background:#1e293b;color:#94a3b8;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px 12px;font-size:12px}
.tabs{display:flex;padding:0 32px;border-bottom:1px solid rgba(255,255,255,0.06)}
.tab{padding:10px 20px;font-size:13px;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:#60a5fa;border-bottom-color:#3b82f6}
.tab:hover:not(.active){color:#94a3b8}
.chart-section{padding:20px 32px}
.chart-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:24px}
.chart-title{font-size:14px;font-weight:600;color:#cbd5e1;margin-bottom:16px}
#chart1,#chart2{width:100%;height:300px}
.table-section{padding:0 32px 32px}
.table-wrap{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:16px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:12px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#475569;text-align:left;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;white-space:nowrap}
th:hover{color:#94a3b8}
td{padding:11px 16px;font-size:13px;color:#cbd5e1;border-bottom:1px solid rgba(255,255,255,0.03);white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:rgba(59,130,246,0.15);color:#60a5fa}
.gmv{color:#10b981;font-weight:600}
.mh{color:#10b981}.mm{color:#f59e0b}.ml{color:#ef4444}
.center{padding:80px;text-align:center;color:#475569}
.center .e{font-size:40px;margin-bottom:12px}
@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr);padding:16px}.top-bar,.filter-bar,.chart-section,.table-section{padding-left:16px;padding-right:16px}.tabs{padding:0 16px}}
</style>
</head>
<body>
<div class="top-bar">
  <div>
    <div class="title">🐾 淘宝畜牧宠物品类数据看板</div>
    <div class="sub" id="updateTime"></div>
  </div>
  <div class="right">

</div>
<div class="kpi-row" id="kpiRow"></div>
<div class="filter-bar">

  <button class="filter-btn active" id="btnAll" onclick="setRange('all')">全部</button>

</div>
<div class="tabs">

  <div class="tab" onclick="switchTab(1)">📊 类目分析</div>
  <div class="tab" onclick="switchTab(2)">📋 商品明细</div>
</div>
<div class="center" id="loadingWrap"><div class="e">⏳</div><p>正在加载...</p></div>
<div id="contentWrap" style="display:none">

  <div id="tab1" class="chart-section" style="display:none"><div class="chart-card"><div class="chart-title">各一级类目 GMV &amp; 订单量对比</div><div id="chart2"></div></div></div>
  <div id="tab2" class="table-section" style="display:none">
    <div class="table-wrap">

    </div>
  </div>
</div>

var curR='all',curC='',sK='gmv',sD=-1,ch1,ch2;
function init(){
  document.getElementById('updateTime').textContent='数据更新：'+D.summary.updated_at;
  var cats=[...new Set(D.records.map(function(r){return r.category1}))];
  document.getElementById('catFilter').innerHTML='<option value="">全部类目</option>'+cats.map(function(c){return '<option value="'+c+'">'+c+'</option>'}).join('');
  renderAll();
  document.getElementById('loadingWrap').style.display='none';
  document.getElementById('contentWrap').style.display='block';
}
function filt(d){
  if(curR!=='all'){var c=new Date();c.setDate(c.getDate()-parseInt(curR));d=d.filter(function(r){return new Date(r.record_date)>=c});}
  if(curC)d=d.filter(function(r){return r.category1===curC});
  return d;
}
function setRange(d){
  curR=d;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
  document.getElementById('btnAll').classList.add('active');
  if(d!=='all'){event.target.classList.add('active');}
  renderAll();
}
function switchTab(i){
  document.querySelectorAll('.tab').forEach(function(t,n){t.classList.toggle('active',n===i)});
  ['tab0','tab1','tab2'].forEach(function(id,n){document.getElementById(id).style.display=n===i?'block':'none'});
  setTimeout(function(){if(i===0&&ch1)ch1.resize();if(i===1&&ch2)ch2.resize()},10);
}
function renderAll(){var d=filt(D.records);renderKPI(d);renderC1(d);renderC2(d);renderT(d);}
function renderKPI(d){
  var o=d.reduce(function(s,r){return s+r.order_quantity},0);
  var g=d.reduce(function(s,r){return s+r.gmv},0);
  var m=d.length?(d.reduce(function(s,r){return s+r.gross_margin},0)/d.length).toFixed(1):'0';
  var items=[['总订单量',o.toLocaleString(),'件','#3b82f6'],['总GMV','¥'+g.toLocaleString(),'','#10b981'],['平均毛利率',m+'%','','#f59e0b'],['商品数量',d.length,'个','#8b5cf6']];
  document.getElementById('kpiRow').innerHTML=items.map(function(v){
    return '<div class="kpi-card"><div class="kpi-label">'+v[0]+'</div><div class="kpi-value" style="color:'+v[3]+'">'+v[1]+'</div>'+(v[2]?'<div class="kpi-sub">'+v[2]+'</div>':'')+'</div>';
  }).join('');
}
function renderC1(d){
  var bd={};
  d.forEach(function(r){if(!bd[r.record_date])bd[r.record_date]={g:0,o:0};bd[r.record_date].g+=r.gmv;bd[r.record_date].o+=r.order_quantity;});
  var ds=Object.keys(bd).sort();
  if(!ch1)ch1=echarts.init(document.getElementById('chart1'));
  ch1.setOption({backgroundColor:'transparent',tooltip:{trigger:'axis',backgroundColor:'#1e293b',borderColor:'#334155',textStyle:{color:'#e2e8f0'},formatter:function(p){return p[0].name+'<br>GMV: ¥'+p[0].value.toLocaleString()+'<br>订单量: '+p[1].value+'件'}},legend:{data:['GMV','订单量'],textStyle:{color:'#64748b'},top:0},grid:{left:60,right:20,top:40,bottom:30},xAxis:{type:'category',data:ds.map(function(d){return d.slice(5)}),axisLine:{lineStyle:{color:'#334155'}},axisLabel:{color:'#64748b'},splitLine:{show:false}},yAxis:[{type:'value',name:'GMV(元)',axisLine:{lineStyle:{color:'#334155'}},axisLabel:{color:'#64748b',formatter:function(v){return '¥'+(v>=1000?v/1000+'k':v)}},splitLine:{lineStyle:{color:'rgba(255,255,255,0.05)'}}},{type:'value',name:'订单量',axisLine:{lineStyle:{color:'#334155'}},axisLabel:{color:'#64748b'},splitLine:{show:false}}],series:[{name:'GMV',type:'line',data:ds.map(function(d){return bd[d].g}),smooth:true,lineStyle:{color:'#10b981',width:3},itemStyle:{color:'#10b981'},areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(16,185,129,0.3)'},{offset:1,color:'rgba(16,185,129,0)'}]}},symbol:'circle',symbolSize:6},{name:'订单量',type:'line',yAxisIndex:1,data:ds.map(function(d){return bd[d].o}),smooth:true,lineStyle:{color:'#3b82f6',width:3},itemStyle:{color:'#3b82f6'},symbol:'circle',symbolSize:6}]},true);
}
function renderC2(d){
  var bc={};
  d.forEach(function(r){if(!bc[r.category1])bc[r.category1]={g:0,o:0};bc[r.category1].g+=r.gmv;bc[r.category1].o+=r.order_quantity;});
  var cs=Object.keys(bc).sort(function(a,b){return bc[b].g-bc[a].g});
  if(!ch2)ch2=echarts.init(document.getElementById('chart2'));
  ch2.setOption({backgroundColor:'transparent',tooltip:{trigger:'axis',backgroundColor:'#1e293b',borderColor:'#334155',textStyle:{color:'#e2e8f0'},formatter:function(p){return p[0].name+'<br>GMV: ¥'+p[0].value.toLocaleString()+'<br>订单量: '+p[1].value+'件'}},legend:{data:['GMV','订单量'],textStyle:{color:'#64748b'},top:0},grid:{left:110,right:20,top:40,bottom:60},xAxis:{type:'value',axisLine:{lineStyle:{color:'#334155'}},axisLabel:{color:'#64748b',formatter:function(v){return '¥'+(v>=1000?v/1000+'k':v)}},splitLine:{lineStyle:{color:'rgba(255,255,255,0.05)'}}},yAxis:{type:'category',data:cs,axisLine:{lineStyle:{color:'#334155'}},axisLabel:{color:'#94a3b8',fontSize:12},splitLine:{show:false}},series:[{name:'GMV',type:'bar',data:cs.map(function(c){return bc[c].g}),itemStyle:{color:{type:'linear',x:0,y:0,x2:1,y2:0,colorStops:[{offset:0,color:'#3b82f6'},{offset:1,color:'#8b5cf6'}]}},barWidth:22},{name:'订单量',type:'bar',data:cs.map(function(c){return bc[c].o}),itemStyle:{color:{type:'linear',x:0,y:0,x2:1,y2:0,colorStops:[{offset:0,color:'#10b981'},{offset:1,color:'#06b6d4'}]}},barWidth:22}]},true);
}
function renderT(d){
  var s=[].concat(d).sort(function(a,b){
    var av=a[sK],bv=b[sK];
    return typeof av==='number'?sD*(av-bv):sD*String(av).localeCompare(String(bv));
  });
  document.getElementById('tableBody').innerHTML=s.map(function(r){
    var m=r.gross_margin,mc=m>=50?'mh':m>=35?'mm':'ml';
    return '<tr><td>'+r.product_name+'</td><td><span class="tag">'+r.category1+'</span></td><td>'+r.order_quantity.toLocaleString()+'</td><td class="gmv">¥'+r.gmv.toLocaleString()+'</td><td class="'+mc+'">'+m+'%</td><td>'+r.record_date+'</td></tr>';
  }).join('');
}
function sort(k){if(sK===k)sD*=-1;else{sK=k;sD=-1};renderT(filt(D.records));}
document.getElementById('catFilter').addEventListener('change',function(e){curC=e.target.value;renderAll()});
window.addEventListener('resize',function(){if(ch1)ch1.resize();if(ch2)ch2.resize()});
init();
</script>
</body>
</html>
